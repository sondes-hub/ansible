all:
  children:
    routers:
      hosts:
        R1:
          ansible_host: 192.168.100.1
          ansible_user: admin
          ansible_password: admin
        R2:
          ansible_host: 192.168.2.1
          ansible_user: admin
          ansible_password: admin
        R3:
          ansible_host: 192.168.3.1
          ansible_user: admin
          ansible_password: admin
      vars:
        ansible_network_os: ios
        ansible_connection: ansible.netcommon.network_cli
        ansible_become: yes
        ansible_become_method: enable
        ansible_become_password: admin
        ansible_ssh_common_args: '-o KexAlgorithms=+diffie-hellman-group1-sha1 -o HostKeyAlgorithms=+ssh-rsa -o Ciphers=+aes128-cbc,aes192-cbc,aes256-cbc'
