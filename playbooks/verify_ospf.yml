---
- name: VÉRIFICATION OSPF
  hosts: routers
  gather_facts: no
  
  vars:
    current_date: "{{ lookup('pipe', 'date +%Y-%m-%d') }}"
    current_time: "{{ lookup('pipe', 'date +%H:%M:%S') }}"
  
  tasks:
    - name: Vérifier les voisins OSPF
      ios_command:
        commands:
          - show ip ospf neighbor
      register: ospf_neighbors
    
    - name: Vérifier les routes OSPF
      ios_command:
        commands:
          - show ip route ospf
      register: ospf_routes
    
    - name: Afficher les voisins
      debug:
        msg: |
          📡 {{ inventory_hostname }} - VOISINS OSPF:
          {{ ospf_neighbors.stdout[0] }}
    
    - name: Générer rapport
      copy:
        content: |
          ========================================
          VÉRIFICATION OSPF - {{ inventory_hostname }}
          Date: {{ current_date }}
          Heure: {{ current_time }}
          ========================================
          
          VOISINS OSPF:
          {{ ospf_neighbors.stdout[0] }}
          
          ROUTES OSPF:
          {{ ospf_routes.stdout[0] }}
        dest: "/home/vagrant/ansible/reports/ospf_{{ inventory_hostname }}_{{ current_date }}.txt"
      delegate_to: localhost
